<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="image">

    <div class="login-container">
        <div class="login-form">
            <h1>Welcome to Our BookSphere</h1>
            <p>Please log in to explore our collection</p>
            <form id="loginForm">
                <div class="input-group"> <i class="fas fa-user"></i> <input type="email" id="email" placeholder="your Email" required>  </div>
             
                <div class="input-group"> <i class="fas fa-lock"></i> <input type="password" id="password" placeholder="Password" required> </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <div id="error" class="error-message"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
